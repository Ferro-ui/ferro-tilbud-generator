<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ferro – Tilbudsbrev Generator</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1B3055;
    --navy-light: #244070;
    --blue: #3A7DC9;
    --blue-light: #5B9FE0;
    --bg: #F0F3F8;
    --card: #ffffff;
    --border: #D5DEF0;
    --text: #1a2030;
    --muted: #6B7B9A;
    --accent-bg: #EAF1FA;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  .header {
    background: #fff;
    padding: 0 28px;
    display: flex;
    align-items: center;
    height: 64px;
    border-bottom: 3px solid var(--navy);
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo-icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
  }
  .logo-text { line-height: 1.1; }
  .logo-text strong {
    display: block;
    color: #fff;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 2px;
  }
  .logo-text span {
    display: block;
    color: rgba(255,255,255,0.55);
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }
  .header-title {
    margin-left: 24px;
    padding-left: 24px;
    border-left: 1px solid #D5DEF0;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 0.3px;
  }

  /* ── Layout ── */
  .layout {
    max-width: 720px;
    margin: 0 auto;
    padding: 28px 16px 48px;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    gap: 3px;
    margin-bottom: 20px;
  }
  .tab-btn {
    flex: 1;
    padding: 8px 10px;
    border: none;
    border-radius: 7px;
    background: transparent;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    color: var(--muted);
    font-weight: 500;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .tab-btn:hover { background: var(--accent-bg); color: var(--navy); }
  .tab-btn.active {
    background: var(--navy);
    color: #fff;
    box-shadow: 0 1px 4px rgba(27,48,85,0.25);
  }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 22px;
    margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* ── Form elements ── */
  .row { margin-bottom: 14px; }
  label {
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    display: block;
    margin-bottom: 5px;
    letter-spacing: 0.2px;
  }
  input, textarea, select {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    background: #fff;
    color: var(--text);
    outline: none;
    transition: border 0.15s, box-shadow 0.15s;
  }
  input:focus, textarea:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(58,125,201,0.12);
  }
  textarea { resize: vertical; line-height: 1.55; }

  .grid2 { display: grid; grid-template-columns: 1fr 2fr; gap: 10px; }

  /* ── Summary box ── */
  .summary {
    background: var(--accent-bg);
    border: 1px solid #C5D8F0;
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 16px;
  }
  .summary table { width: 100%; font-size: 14px; border-collapse: collapse; }
  .summary td { padding: 4px 0; color: var(--muted); }
  .summary td:last-child { text-align: right; font-weight: 600; color: var(--text); }
  .summary tr:last-child td { color: var(--navy); font-size: 15px; }

  /* ── Hint ── */
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 16px;
    padding: 10px 14px;
    background: var(--accent-bg);
    border-radius: 7px;
    border-left: 3px solid var(--blue);
  }

  /* ── Preview / pre ── */
  pre {
    font-family: "SF Mono", "Fira Mono", monospace;
    font-size: 12px;
    line-height: 1.65;
    background: #F7F9FC;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 18px;
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 520px;
    overflow-y: auto;
    color: #2a3545;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 9px 18px;
    border-radius: 7px;
    border: none;
    font-size: 13px;
    font-family: inherit;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.2px;
  }
  .btn-primary {
    background: var(--navy);
    color: #fff;
  }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-success {
    background: #1e7e4b;
    color: #fff;
  }
  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
  }
  .btn-ghost:hover { background: var(--accent-bg); }
  .preview-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-bottom: 12px;
  }

  /* ── Section divider ── */
  .section-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--muted);
    margin: 20px 0 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .section-label::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  @media (max-width: 500px) {
    .grid2 { grid-template-columns: 1fr; }
    .tab-btn { font-size: 12px; padding: 8px 6px; }
  }
</style>
</head>

const FORUTSETNINGER = `Tiltakshaver står selv for:
- Grunnarbeid og komprimering av byggetomt
- Offentlige gebyrer og søknadskostnader
- Fiber inn til bygning
- Dokumentasjon av grunnforhold og uavhengig kontroll
- Brannisolering - tilbys separat ved behov
- Klimagass- og bygningsfysikkrapport - tilbys separat ved behov
- All rivning og klargjøring av byggeplass
- Oljeutskiller og tilknyttet rørarbeid
- Trær, busker og inventar

Generelle betingelser:
- Ved tilleggsarbeid: 750,- pr. time for montør, 1 200,- pr. time for prosjektleder, 15 % materialpåslag.
- Mengder gjeldende og reguleres før kontrakt i samråd med tiltakshaver.
- Tilbudet skal skriftlig bestilles av kunde.
- Medfølgende tegning på stålkonstruksjon gjelder for pris. Det forutsettes kontinuerlig montasje.
- Prisene er basert på anbudsdagens materialpriser og lønninger med vanlig adgang til forhåndsmessig prisjustering.
- Fundamentering dimensjonert for monteringslaster. Setninger fra ferdigstilt grunnarbeid er ikke Ferro sitt ansvar.
- Tiltakshaver sørger for fremkommelig vei rundt bygget - minimum 4 m bredde for kran og transport.
- Tilbudet er gyldig i 14 dager.
- Tilbudet på stål er bygd på gårsdagens innkjøpspriser av stålprofiler. Verkene har varslet prisoppgang og holder kun prisene på dagsbasis. Vi forbeholder oss retten til gjennomgang og eventuell endring av innkjøpspriser ved kontrahering. Endringen gjelder kun stålprofil innkjøp.
- Forutsetter tiltaksklasse 2. Seismikk utelates. Direkte fundamentering 250 kN/m² bruddgrense (fjell og sprengstein). Bygget forutsettes ikke pelet.
- U-verdi tak 0,18 - U-verdi vegg 0,18 - U-verdi glass 1,2.
- Tilbudet er gitt under en pågående krig i Ukraina - ansett som force majeure iht. NS 8417 pkt. 33 / NS 8415 pkt. 24. Fremdriftshindring som forårsakes av krigen gir krav på fristforlengelse og eventuelt tilleggsvederlag.
- Ryddet ut etter eget arbeid - ikke vasket. Offentlig vann/avløp og strømtilførsel til byggegrop er med i pris.`;

    L.push(""); L.push("Med vennlig hilsen");
    L.push("Vegard Landsdal");
    L.push("Daglig leder, Ferro Stålentreprenør AS");
    L.push("vegard@ferrostal.no  •  Tlf: 95 83 71 23");
    L.push(""); L.push("─────────────────────────────────");
    L.push("ARBEIDSBESKRIVELSE"); L.push("─────────────────────────────────");
    SCOPE_ITEMS.forEach(item => {
      if (scope[item.key]) { L.push(""); L.push(item.label.toUpperCase()); L.push(scope[item.key]); }
    });
    if (opsVal > 0) {
      L.push(""); L.push("OPSJONER (eks. mva)");
      L.push(`Sum opsjoner eks. mva:   ${fmtExact(opsVal)}`);
      L.push(`Mva (25 %):              ${fmtExact(opsMva)}`);
      L.push(`Sum opsjoner ink. mva:   ${fmtExact(opsInk)}`);
    }
    L.push(""); L.push("─────────────────────────────────");
    L.push("GENERELLE FORUTSETNINGER"); L.push("─────────────────────────────────");
    L.push(FORUTSETNINGER);
    L.push(""); L.push("Ferro Stålentreprenør AS  •  Ringsevja 3, 3830 Ulefoss  •  Tlf: 95 83 71 23");
    return L.join("\n");
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(genText()).then(()=>{ setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  const tabs = [
    { id:"info",    label:"Prosjektinfo" },
    { id:"pris",    label:"Pris" },
    { id:"scope",   label:"Omfang" },
    { id:"preview", label:"Forhåndsvisning" },
  ];

  return (
    <div className="layout">
      <div className="tabs">
        {tabs.map(t => (
          <button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==="info" && (
        <div className="card">
          <div className="card-title">Prosjektinformasjon</div>
          <div className="row"><label>Prosjektnavn</label><input value={info.prosjekt} onChange={setI("prosjekt")} placeholder="Lagerbygg Steinsholt"/></div>
          <div className="section-label">Kunde</div>
          <div className="row"><label>Firma</label><input value={info.kunde} onChange={setI("kunde")} placeholder="Reis AS"/></div>
          <div className="row"><label>Kontaktperson</label><input value={info.kontakt} onChange={setI("kontakt")} placeholder="Eskil Støvland"/></div>
          <div className="row"><label>Adresse</label><input value={info.adresse} onChange={setI("adresse")} placeholder="Hegdalringen 6B"/></div>
          <div className="grid2 row">
            <div><label>Postnummer</label><input value={info.postnr} onChange={setI("postnr")} placeholder="3261"/></div>
            <div><label>Sted</label><input value={info.sted} onChange={setI("sted")} placeholder="Larvik"/></div>
          </div>
          <div className="section-label">Dato</div>
          <div className="row"><label>Tilbudsdato</label><input type="date" style={{width:180}} value={info.dato} onChange={setI("dato")}/></div>
        </div>
      )}

      {tab==="pris" && (
        <div className="card">
          <div className="card-title">Prissammendrag</div>
          <div className="row">
            <label>Sum eks. mva (kr) — råtall fra kalkulasjon</label>
            <input style={{width:220}} value={pris.sumEks} onChange={e=>setPris(p=>({...p,sumEks:e.target.value}))} placeholder="1234567"/>
          </div>
          {sumEksR > 0 && (
            <div className="summary">
              <table><tbody>
                <tr><td>Sum uten opsjoner eks. mva</td><td>{fmt(sumEksR)}</td></tr>
                <tr><td>Mva (25 %)</td><td>{fmtExact(mva)}</td></tr>
                <tr><td><strong>Sum ink. mva</strong></td><td><strong>{fmtExact(sumInk)}</strong></td></tr>
              </tbody></table>
            </div>
          )}
          <div className="section-label">Opsjoner</div>
          <div className="row">
            <label>Opsjoner eks. mva (kr) — la stå tomt om ingen</label>
            <input style={{width:220}} value={pris.opsjoner} onChange={e=>setPris(p=>({...p,opsjoner:e.target.value}))} placeholder="51100"/>
          </div>
          {opsVal > 0 && (
            <div className="summary">
              <table><tbody>
                <tr><td>Sum opsjoner eks. mva</td><td>{fmtExact(opsVal)}</td></tr>
                <tr><td>Mva (25 %)</td><td>{fmtExact(opsMva)}</td></tr>
                <tr><td><strong>Sum opsjoner ink. mva</strong></td><td><strong>{fmtExact(opsInk)}</strong></td></tr>
              </tbody></table>
            </div>
          )}
        </div>
      )}

      {tab==="scope" && (
        <div>
          <div className="hint">Tøm et felt for å utelate posten fra tilbudet.</div>
          <div className="card">
            <div className="card-title">Arbeidsbeskrivelse</div>
            {SCOPE_ITEMS.map(item => (
              <div key={item.key} className="row">
                <label>{item.label}</label>
                <textarea style={{minHeight:68}} value={scope[item.key]} onChange={e=>setScope(p=>({...p,[item.key]:e.target.value}))}/>
              </div>
            ))}
          </div>
        </div>
      )}

      {tab==="preview" && (
        <div>
          <div className="preview-actions">
            <button className={`btn ${copied?"btn-success":"btn-primary"}`} onClick={handleCopy}>
              {copied ? "✓ Kopiert!" : "Kopier tekst"}
            </button>
          </div>
          <pre>{genText()}</pre>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
