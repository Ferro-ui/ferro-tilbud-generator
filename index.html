<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #1B3055; --navy-light: #244070; --blue: #3A7DC9; --blue-light: #5B9FE0;
    --bg: #F0F3F8; --card: #ffffff; --border: #D5DEF0; --text: #1a2030;
    --muted: #6B7B9A; --accent-bg: #EAF1FA; --danger: #c0392b; --danger-light: #fadbd8;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: #fff; padding: 0 28px; display: flex; align-items: center; height: 64px; border-bottom: 3px solid var(--navy); box-shadow: 0 2px 6px rgba(0,0,0,0.08); }
  .logo { display: flex; align-items: center; gap: 12px; }
  .logo img { height: 36px; }
  .header-title { margin-left: 24px; padding-left: 24px; border-left: 1px solid #D5DEF0; color: var(--muted); font-size: 13px; }
  .layout { max-width: 760px; margin: 0 auto; padding: 28px 16px 60px; }
  .tabs { display: flex; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 4px; gap: 3px; margin-bottom: 20px; }
  .tab-btn { flex: 1; padding: 8px 6px; border: none; border-radius: 7px; background: transparent; cursor: pointer; font-size: 12px; font-family: inherit; font-weight: 500; color: var(--muted); transition: all 0.15s; white-space: nowrap; }
  .tab-btn:hover { background: var(--accent-bg); color: var(--navy); }
  .tab-btn.active { background: var(--navy); color: #fff; font-weight: 600; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px 22px; margin-bottom: 16px; }
  .card-title { font-size: 13px; font-weight: 700; color: var(--navy); letter-spacing: 0.5px; text-transform: uppercase; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
  .row { margin-bottom: 14px; display: flex; flex-direction: column; gap: 5px; }
  label { font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; }
  input, textarea, select { width: 100%; padding: 8px 11px; border: 1px solid var(--border); border-radius: 7px; font-size: 14px; font-family: inherit; color: var(--text); background: #fff; outline: none; transition: border 0.15s; }
  input:focus, textarea:focus { border-color: var(--blue); }
  textarea { resize: vertical; min-height: 72px; line-height: 1.5; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .section-label { font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); margin: 20px 0 12px; display: flex; align-items: center; gap: 10px; }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--border); }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; border-radius: 7px; border: none; font-size: 13px; font-family: inherit; font-weight: 600; cursor: pointer; transition: all 0.15s; }
  .btn-primary { background: var(--navy); color: #fff; }
  .btn-primary:hover { background: var(--navy-light); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-success { background: #1e7e4b; color: #fff; }
  .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); padding: 6px 12px; font-size: 12px; }
  .btn-ghost:hover { background: var(--accent-bg); }
  .btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-danger { background: transparent; border: 1px solid #e0b0aa; color: var(--danger); padding: 5px 10px; font-size: 12px; }
  .btn-danger:hover { background: var(--danger-light); }
  .btn-sm { padding: 4px 9px; font-size: 11px; border-radius: 5px; }
  .preview-actions { display: flex; justify-content: flex-end; gap: 8px; margin-bottom: 12px; }
  pre { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 20px; font-size: 12.5px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
  .summary { background: var(--accent-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px 16px; margin: 8px 0 16px; }
  .summary table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .summary td { padding: 4px 6px; }
  .summary td:last-child { text-align: right; }
  .hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; padding: 8px 12px; background: var(--accent-bg); border-radius: 7px; border-left: 3px solid var(--blue); }
  .drop-zone { border: 2px dashed var(--border); border-radius: 10px; padding: 32px 20px; text-align: center; cursor: pointer; transition: all 0.15s; background: #fff; margin-bottom: 14px; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--blue); background: var(--accent-bg); }
  .drop-icon { font-size: 28px; margin-bottom: 8px; color: var(--muted); line-height: 1; }
  .drop-text { font-size: 14px; color: var(--muted); }
  .drop-text strong { color: var(--navy); }
  .file-list { margin-top: 10px; display: flex; flex-direction: column; gap: 6px; }
  .file-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; background: var(--accent-bg); border-radius: 6px; font-size: 13px; }
  .file-item .file-name { flex: 1; color: var(--navy); font-weight: 500; }
  .file-item .file-size { color: var(--muted); font-size: 11px; }
  .status-box { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-top: 12px; line-height: 1.5; }
  .status-info { background: #e8f4fd; border: 1px solid #bee3f8; color: #2a6496; }
  .status-error { background: var(--danger-light); border: 1px solid #f5c6cb; color: #721c24; }
  .status-ok { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
  .scope-item { border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; background: #fff; }
  .scope-item-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .scope-label-input { flex: 1; font-weight: 600; font-size: 13px; color: var(--navy); border: none; border-bottom: 1px dashed var(--border); border-radius: 0; padding: 3px 4px; background: transparent; width: auto; }
  .scope-label-input:focus { border-bottom-color: var(--blue); outline: none; }
  .scope-move-btns { display: flex; gap: 3px; }
  .scope-text { min-height: 60px; font-size: 13px; }
  .scope-add-row { text-align: center; margin-top: 6px; }
  @media (max-width: 500px) { .grid2 { grid-template-columns: 1fr; } .tab-btn { font-size: 11px; padding: 8px 4px; } }
</style>

<script type="text/babel">
const { useState, useCallback } = React;

function today() { return new Date().toISOString().slice(0, 10); }
function fmtDate(s) { if (!s) return ''; const [y,m,d] = s.split('-'); return d+'.'+m+'.'+y; }
function fmt(n) { return (Math.round(n/1000)*1000).toLocaleString('nb-NO') + ',-'; }
function fmtExact(n) { return Math.round(n).toLocaleString('nb-NO') + ',-'; }

const DEFAULT_SCOPE = [
  { id:'s1',  label:'Bygget',                                              text:'' },
  { id:'s2',  label:'Grunnarbeid',                                         text:'Grunnarbeid er ikke medregnet, og graver m\u00e5 gj\u00f8re klart for isolering og st\u00f8p. Forutsetter at graver legger str\u00f8m, vann og avl\u00f8p inn til innsiden av byggets yttervegg. Frostisolering utvendig m\u00e5 ivaretas av grave firma.' },
  { id:'s3',  label:'Betongarbeid',                                        text:'Betongarbeid er ikke medregnet.' },
  { id:'s4',  label:'St\u00e5l',                                           text:'St\u00e5lkonstruksjon leveres ferdig dimensjonert med boltegruppe og sveiseplate. St\u00e5let leveres med RAL 7000 C2L, industrikvalitet, forbehandlingsklasse P1.\n\nForutsetninger for dimensjoneringer:\n- NS-EN 1990, NS-EN 1991 (del 1-1, 1-2, 1-3, 1-4), NS-EN 1993 (del 1-1, 1-8, 1-10), NS-EN 1090-2:2008\n- Det forutsettes at taket er stiv skive\n- Ingen branndimensjonering eller beskyttelse\n- S\u00f8yler er ikke kontrollert for p\u00e5kj\u00f8rsel - jordskjelvberegninger er ikke medtatt\n- St\u00e5let er slynget SA 2,5 og primet med jernoksyd - galvanisert og boltet' },
  { id:'s5',  label:'Yttervegger',                                         text:'' },
  { id:'s6',  label:'Innervegg',                                           text:'Ingen innvendige vegger.' },
  { id:'s7',  label:'Himling innvendig',                                   text:'Synlig overflate er underside TRP-plater med Aluzink og korrosjonsklasse C3.' },
  { id:'s8',  label:'Overflater gulver',                                   text:'St\u00e5lglattet betonggulv for gulv p\u00e5 grunn. Betongarbeid er ikke medregnet.' },
  { id:'s9',  label:'Trapper / L\u00e5s og beslag',                        text:'Ingen trapper medregnet. St\u00e5ld\u00f8r leveres med standard h\u00e5ndtak, sylinder med n\u00f8kkell\u00e5s og d\u00f8rpumpe under 30 N.' },
  { id:'s10', label:'Vinduer og d\u00f8rer',                               text:'' },
  { id:'s11', label:'Porter',                                              text:'' },
  { id:'s12', label:'Tak',                                                 text:'' },
  { id:'s13', label:'Inventar / Foliering / Screens / R\u00f8rlegger / Elektro', text:'Ikke medregnet.' },
  { id:'s14', label:'Ventilasjon',                                         text:'Ventilasjon er ikke medregnet annet enn \u00e5 klarlegge \u00e5pninger og beslag om dette blir aktuelt. Antar elektro leverer vifte.' },
  { id:'s15', label:'Branntetting / sikring',                              text:'Det er ikke medtatt brannisolering av b\u00e6resystem og det forutsettes R0 p\u00e5 st\u00e5let, men dette kan ikke fastsettes f\u00f8r det er utarbeidet en brannrapport.' },
  { id:'s16', label:'Prosjektering / Arkitekt',                           text:'Ikke medregnet.' },
  { id:'s17', label:'Mengder',                                             text:'Mengder i tilbudet fra Ferro er gjeldende og reguleres f\u00f8r kontrakt i samr\u00e5d med tiltakshaver.' },
  { id:'s18', label:'Rigg og drift',                                       text:'Det er medregnet rigg og drift for gjennomf\u00f8ring av arbeidene. Dette inkluderer transport av mannskap og utstyr, HMS-tiltak p\u00e5 byggeplass og n\u00f8dvendig koordinering i byggeperioden.' },
];

let _nextId = 100;
function newId() { return 'si' + (_nextId++); }

async function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => { resolve(btoa(String.fromCharCode(...new Uint8Array(e.target.result)))); };
    r.onerror = reject;
    r.readAsArrayBuffer(file);
  });
}

async function readExcelAsText(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type:'array' });
        let out = '';
        wb.SheetNames.forEach(name => {
          out += '\n=== Ark: ' + name + ' ===\n';
          out += XLSX.utils.sheet_to_csv(wb.Sheets[name], { FS:'\t' });
        });
        resolve(out.trim());
      } catch(err) { reject(err); }
    };
    r.onerror = reject;
    r.readAsArrayBuffer(file);
  });
}

async function callClaude(apiKey, contentParts) {
  const system = `Du er en assistent som analyserer tilbudsforesp\u00f8rsler for Ferro St\u00e5lentrepren\u00f8r AS og trekker ut strukturerte data.

Returner ALLTID et JSON-objekt med disse feltene (tomme strenger om ukjent):
{
  "prosjekt": "prosjektnavn",
  "kunde": "firmanavn",
  "kontakt": "kontaktperson",
  "adresse": "gateadresse",
  "postnr": "postnummer",
  "sted": "stedsnavn",
  "dato": "YYYY-MM-DD",
  "sumEks": "tallverdi uten mellomrom",
  "opsjoner": "tallverdi eks mva, eller tom",
  "scope": {
    "Bygget": "st\u00f8rrelse, m\u00e5l, type bygg",
    "St\u00e5l": "st\u00e5lkonstruksjon detaljer",
    "Yttervegger": "fasade/kledning",
    "Tak": "takdetaljer",
    "Vinduer og d\u00f8rer": "detaljer",
    "Porter": "portdetaljer"
  },
  "opsList": ["tekstbeskrivelse av opsjon 1", "opsjon 2"]
}

VIKTIG: Returner KUN gyldig JSON, ingen forklaring.`;

  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 4096,
      system,
      messages: [{ role:'user', content: contentParts }]
    })
  });
  if (!res.ok) throw new Error('API-feil ' + res.status + ': ' + await res.text());
  const data = await res.json();
  return data.content[0].text;
}

function App() {
  const [tab, setTab] = useState('upload');
  const [info, setInfo] = useState({ prosjekt:'', kunde:'', kontakt:'', adresse:'', postnr:'', sted:'', dato:today() });
  const [pris, setPris] = useState({ sumEks:'', opsjoner:'' });
  const [scopeItems, setScopeItems] = useState(DEFAULT_SCOPE);
  const [opsList, setOpsList] = useState([]);
  const [apiKey, setApiKey] = useState('');
  const [files, setFiles] = useState([]);
  const [status, setStatus] = useState(null);
  const [processing, setProcessing] = useState(false);
  const [dragOver, setDragOver] = useState(false);
  const [docxStatus, setDocxStatus] = useState(null);
  const [copied, setCopied] = useState(false);

  const sumEks  = parseFloat((pris.sumEks||'').replace(/\s/g,'').replace(',','.')) || 0;
  const sumEksR = Math.round(sumEks/1000)*1000;
  const mva     = Math.round(sumEksR*0.25);
  const sumInk  = sumEksR + mva;
  const opsVal  = parseFloat((pris.opsjoner||'').replace(/\s/g,'').replace(',','.')) || 0;
  const opsMva  = Math.round(opsVal*0.25);
  const opsInk  = opsVal + opsMva;

  const setI = k => e => setInfo(p => ({...p, [k]: e.target.value}));

  // ── File drop ──
  const handleFiles = useCallback(newFiles => {
    const allowed = ['pdf','xlsx','xls','jpg','jpeg','png','docx'];
    const filtered = Array.from(newFiles).filter(f => allowed.includes(f.name.split('.').pop().toLowerCase()));
    setFiles(prev => {
      const names = new Set(prev.map(f => f.name));
      return [...prev, ...filtered.filter(f => !names.has(f.name))];
    });
  }, []);

  // ── Process with Claude ──
  const processFiles = async () => {
    if (!apiKey.trim()) { setStatus({ type:'error', msg:'Legg inn Anthropic API-n\u00f8kkel f\u00f8rst.' }); return; }
    if (!files.length)  { setStatus({ type:'error', msg:'Legg til minst \u00e9n fil.' }); return; }
    setProcessing(true);
    setStatus({ type:'info', msg:'Behandler filer...' });
    try {
      const parts = [];
      for (const file of files) {
        const ext = file.name.split('.').pop().toLowerCase();
        setStatus({ type:'info', msg:'Leser ' + file.name + '...' });
        if (['jpg','jpeg','png'].includes(ext)) {
          const b64 = await readFileAsBase64(file);
          parts.push({ type:'image', source:{ type:'base64', media_type: ext==='png'?'image/png':'image/jpeg', data:b64 } });
          parts.push({ type:'text', text:'Fil: ' + file.name });
        } else if (['xlsx','xls'].includes(ext)) {
          const text = await readExcelAsText(file);
          parts.push({ type:'text', text:'Excel: ' + file.name + '\n\n' + text });
        } else if (ext === 'docx') {
          parts.push({ type:'text', text:'Word-dokument: ' + file.name });
        } else if (ext === 'pdf') {
          parts.push({ type:'text', text:'PDF: ' + file.name + ' (tekst ikke tilgjengelig i nettleser - se filnavn og kontekst)' });
        }
      }
      parts.push({ type:'text', text:'Analyser disse filene og returner JSON med tilbudsdata.' });
      setStatus({ type:'info', msg:'Sender til Claude...' });
      const raw = await callClaude(apiKey.trim(), parts);
      let parsed;
      try { const m = raw.match(/\{[\s\S]*\}/); parsed = JSON.parse(m ? m[0] : raw); }
      catch(e) { throw new Error('Kunne ikke parse svar fra Claude: ' + raw.slice(0,200)); }

      if (parsed.prosjekt) setInfo(p => ({...p, prosjekt:parsed.prosjekt}));
      if (parsed.kunde)    setInfo(p => ({...p, kunde:parsed.kunde}));
      if (parsed.kontakt)  setInfo(p => ({...p, kontakt:parsed.kontakt}));
      if (parsed.adresse)  setInfo(p => ({...p, adresse:parsed.adresse}));
      if (parsed.postnr)   setInfo(p => ({...p, postnr:parsed.postnr}));
      if (parsed.sted)     setInfo(p => ({...p, sted:parsed.sted}));
      if (parsed.dato)     setInfo(p => ({...p, dato:parsed.dato}));
      if (parsed.sumEks)   setPris(p => ({...p, sumEks:String(parsed.sumEks)}));
      if (parsed.opsjoner) setPris(p => ({...p, opsjoner:String(parsed.opsjoner)}));
      if (Array.isArray(parsed.opsList)) setOpsList(parsed.opsList);
      if (parsed.scope && typeof parsed.scope === 'object') {
        setScopeItems(prev => prev.map(item => {
          const key = Object.keys(parsed.scope).find(k =>
            k.toLowerCase().includes(item.label.toLowerCase().split('/')[0].trim().toLowerCase()) ||
            item.label.toLowerCase().includes(k.toLowerCase())
          );
          return (key && parsed.scope[key]) ? {...item, text:parsed.scope[key]} : item;
        }));
      }
      setStatus({ type:'ok', msg:'Ferdig! Sjekk fanene og juster om n\u00f8dvendig.' });
      setTab('info');
    } catch(err) {
      setStatus({ type:'error', msg: String(err.message || err) });
    } finally { setProcessing(false); }
  };

  // ── Scope editor ──
  const moveUp   = idx => { if (idx===0) return; setScopeItems(p => { const a=[...p]; [a[idx-1],a[idx]]=[a[idx],a[idx-1]]; return a; }); };
  const moveDown = idx => { setScopeItems(p => { if (idx>=p.length-1) return p; const a=[...p]; [a[idx],a[idx+1]]=[a[idx+1],a[idx]]; return a; }); };
  const deleteItem  = idx => setScopeItems(p => p.filter((_,i)=>i!==idx));
  const addItem     = ()  => setScopeItems(p => [...p, {id:newId(), label:'Ny post', text:''}]);
  const updateLabel = (idx,v) => setScopeItems(p => p.map((it,i)=>i===idx?{...it,label:v}:it));
  const updateText  = (idx,v) => setScopeItems(p => p.map((it,i)=>i===idx?{...it,text:v}:it));

  // ── Preview text ──
  const genText = () => {
    const L = [];
    L.push('PRISTILBUD \u2013 ' + (info.prosjekt||'[Prosjektnavn]'));
    L.push('Dato: ' + fmtDate(info.dato));
    L.push('');
    L.push('TILBUD TIL');
    L.push(info.kunde||'[Kunde]');
    if (info.kontakt) L.push('v/ ' + info.kontakt);
    if (info.adresse) L.push(info.adresse);
    L.push(((info.postnr||'') + ' ' + (info.sted||'')).trim());
    L.push('');
    L.push('PRISSAMMENDRAG');
    L.push('Sum uten opsjoner eks. mva   ' + (sumEksR ? fmt(sumEksR) : '000 000,-'));
    L.push('Mva (25 %)                   ' + (sumEksR ? fmtExact(mva) : '000 000,-'));
    L.push('Sum ink. mva                 ' + (sumEksR ? fmtExact(sumInk) : '000 000,-'));
    L.push('Gyldig i 14 dager fra ' + fmtDate(info.dato));
    L.push('');
    L.push('Vi takker for deres foresp\u00f8rsel og har gleden av \u00e5 tilby dere f\u00f8lgende:');
    L.push('I vedleggene ligger v\u00e5r beskrivelse av arbeidet. Vi h\u00e5per tilbudet er tilfredsstillende og at deres \u00f8nsker har blitt ivaretatt. H\u00e5per dere aksepterer tilbudet og tar kontakt ved sp\u00f8rsm\u00e5l.');
    L.push('');
    L.push('Med vennlig hilsen');
    L.push('Vegard Landsdal');
    L.push('Daglig leder, Ferro St\u00e5lentrepren\u00f8r AS');
    L.push('vegard@ferrostal.no  \u2022  Tlf: 95 83 71 23');
    L.push('');
    L.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
    L.push('ARBEIDSBESKRIVELSE');
    L.push('\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500');
    scopeItems.forEach(item => {
      if (item.text && item.text.trim()) { L.push(''); L.push(item.label.toUpperCase()); L.push(item.text); }
    });
    if (opsVal > 0 || opsList.length > 0) {
      L.push(''); L.push('OPSJONER (eks. mva)');
      opsList.forEach(o => L.push(o));
      if (opsVal > 0) {
        L.push('Sum opsjoner eks. mva:   ' + fmtExact(opsVal));
        L.push('Mva (25 %):              ' + fmtExact(opsMva));
        L.push('Sum opsjoner ink. mva:   ' + fmtExact(opsInk));
      }
    }
    return L.join('\n');
  };

  const handleCopy = () => {
    navigator.clipboard.writeText(genText()).then(() => { setCopied(true); setTimeout(()=>setCopied(false),2000); });
  };

  const handleDownloadDocx = async () => {
    setDocxStatus('Genererer .docx...');
    try {
      if (!window.docx) throw new Error('docx.js ikke lastet');
      if (typeof generateTilbudDocx !== 'function') throw new Error('generate.js ikke lastet');
      const blob = await generateTilbudDocx(info, pris, scopeItems, opsList);
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'Tilbud_' + (info.prosjekt||'Ferro').replace(/\s+/g,'_') + '_' + (info.dato||today()) + '.docx';
      a.click();
      URL.revokeObjectURL(url);
      setDocxStatus(null);
    } catch(err) { setDocxStatus('Feil: ' + err.message); }
  };

  const TABS = [
    { id:'upload',  label:'Last opp' },
    { id:'info',    label:'Prosjektinfo' },
    { id:'pris',    label:'Pris' },
    { id:'scope',   label:'Omfang' },
    { id:'preview', label:'Forh\u00e5ndsvisning' },
  ];

  return (
    <div className="layout">
      <div className="tabs">
        {TABS.map(t => (
          <button key={t.id} className={'tab-btn'+(tab===t.id?' active':'')} onClick={()=>setTab(t.id)}>
            {t.label}
          </button>
        ))}
      </div>

      {tab==='upload' && (
        <div>
          <div className="card">
            <div className="card-title">Last opp prosjektfiler</div>
            <div className="hint">
              Last opp tilbudsforesp&#248;rsel, tegninger, Excel-kalkyle eller bilder. Claude analyserer filene og fyller ut skjemaet automatisk.
            </div>
            <div
              className={'drop-zone'+(dragOver?' drag-over':'')}
              onDragOver={e=>{e.preventDefault();setDragOver(true);}}
              onDragLeave={()=>setDragOver(false)}
              onDrop={e=>{e.preventDefault();setDragOver(false);handleFiles(e.dataTransfer.files);}}
              onClick={()=>document.getElementById('fileInput').click()}
            >
              <div className="drop-icon">+</div>
              <div className="drop-text"><strong>Klikk eller dra filer hit</strong><br/>PDF, Excel, Word, JPG, PNG</div>
              <input id="fileInput" type="file" multiple accept=".pdf,.xlsx,.xls,.jpg,.jpeg,.png,.docx"
                style={{display:'none'}} onChange={e=>handleFiles(e.target.files)} />
            </div>
            {files.length > 0 && (
              <div className="file-list">
                {files.map(f => (
                  <div key={f.name} className="file-item">
                    <span className="file-name">{f.name}</span>
                    <span className="file-size">{(f.size/1024).toFixed(0)} KB</span>
                    <button className="btn btn-danger btn-sm" onClick={()=>setFiles(p=>p.filter(x=>x.name!==f.name))}>x</button>
                  </div>
                ))}
              </div>
            )}
          </div>

          <div className="card">
            <div className="card-title">API-n&#248;kkel</div>
            <div className="row">
              <label>Anthropic API-n&#248;kkel (sk-ant-...)</label>
              <input type="password" value={apiKey} onChange={e=>setApiKey(e.target.value)}
                placeholder="sk-ant-api03-..." autoComplete="off" />
            </div>
            <button className="btn btn-primary" onClick={processFiles} disabled={processing}>
              {processing ? 'Behandler...' : 'Analyser med Claude'}
            </button>
            {status && <div className={'status-box status-'+status.type} style={{marginTop:12}}>{status.msg}</div>}
          </div>
        </div>
      )}

      {tab==='info' && (
        <div className="card">
          <div className="card-title">Prosjektinformasjon</div>
          <div className="row"><label>Prosjektnavn</label><input value={info.prosjekt} onChange={setI('prosjekt')} placeholder="Lagerbygg Steinsholt"/></div>
          <div className="section-label">Kunde</div>
          <div className="row"><label>Firma</label><input value={info.kunde} onChange={setI('kunde')} placeholder="Reis AS"/></div>
          <div className="row"><label>Kontaktperson</label><input value={info.kontakt} onChange={setI('kontakt')} placeholder="Eskil St&#248;vland"/></div>
          <div className="row"><label>Adresse</label><input value={info.adresse} onChange={setI('adresse')} placeholder="Hegdalringen 6B"/></div>
          <div className="grid2 row">
            <div><label>Postnummer</label><input value={info.postnr} onChange={setI('postnr')} placeholder="3261"/></div>
            <div><label>Sted</label><input value={info.sted} onChange={setI('sted')} placeholder="Larvik"/></div>
          </div>
          <div className="section-label">Dato</div>
          <div className="row"><label>Tilbudsdato</label><input type="date" style={{width:180}} value={info.dato} onChange={setI('dato')}/></div>
        </div>
      )}

      {tab==='pris' && (
        <div className="card">
          <div className="card-title">Prissammendrag</div>
          <div className="row">
            <label>Sum eks. mva (kr) &#8212; r&#229;tall fra kalkulasjon</label>
            <input style={{width:220}} value={pris.sumEks} onChange={e=>setPris(p=>({...p,sumEks:e.target.value}))} placeholder="1234567"/>
          </div>
          {sumEksR>0 && (
            <div className="summary"><table><tbody>
              <tr><td>Sum uten opsjoner eks. mva</td><td>{fmt(sumEksR)}</td></tr>
              <tr><td>Mva (25 %)</td><td>{fmtExact(mva)}</td></tr>
              <tr><td><strong>Sum ink. mva</strong></td><td><strong>{fmtExact(sumInk)}</strong></td></tr>
            </tbody></table></div>
          )}
          <div className="section-label">Opsjoner</div>
          <div className="row">
            <label>Opsjoner eks. mva (kr) &#8212; la st&#229; tomt om ingen</label>
            <input style={{width:220}} value={pris.opsjoner} onChange={e=>setPris(p=>({...p,opsjoner:e.target.value}))} placeholder="51100"/>
          </div>
          {opsVal>0 && (
            <div className="summary"><table><tbody>
              <tr><td>Sum opsjoner eks. mva</td><td>{fmtExact(opsVal)}</td></tr>
              <tr><td>Mva (25 %)</td><td>{fmtExact(opsMva)}</td></tr>
              <tr><td><strong>Sum opsjoner ink. mva</strong></td><td><strong>{fmtExact(opsInk)}</strong></td></tr>
            </tbody></table></div>
          )}
          <div className="section-label">Opsjonsliste</div>
          <div className="hint">Beskriv hva opsjonene inkluderer (&#233;n linje per opsjon).</div>
          {opsList.map((o,i) => (
            <div key={i} className="row" style={{flexDirection:'row',gap:8,alignItems:'center'}}>
              <input style={{flex:1}} value={o}
                onChange={e=>setOpsList(p=>p.map((x,j)=>j===i?e.target.value:x))}
                placeholder="Motor for port: 12 000,-"/>
              <button className="btn btn-danger btn-sm" onClick={()=>setOpsList(p=>p.filter((_,j)=>j!==i))}>x</button>
            </div>
          ))}
          <button className="btn btn-ghost" onClick={()=>setOpsList(p=>[...p,''])}>+ Legg til opsjon</button>
        </div>
      )}

      {tab==='scope' && (
        <div>
          <div className="hint">Rediger label og tekst. T&#248;m tekst for &#229; utelate posten. Bruk pilene for &#229; endre rekkef&#248;lge.</div>
          {scopeItems.map((item,idx) => (
            <div key={item.id} className="scope-item">
              <div className="scope-item-header">
                <div className="scope-move-btns">
                  <button className="btn btn-ghost btn-sm" onClick={()=>moveUp(idx)} disabled={idx===0}>&#8593;</button>
                  <button className="btn btn-ghost btn-sm" onClick={()=>moveDown(idx)} disabled={idx===scopeItems.length-1}>&#8595;</button>
                </div>
                <input className="scope-label-input" value={item.label} onChange={e=>updateLabel(idx,e.target.value)}/>
                <button className="btn btn-danger btn-sm" onClick={()=>deleteItem(idx)}>&#10005;</button>
              </div>
              <textarea className="scope-text" value={item.text} onChange={e=>updateText(idx,e.target.value)}
                placeholder="(tom = utelates fra tilbudet)"/>
            </div>
          ))}
          <div className="scope-add-row">
            <button className="btn btn-ghost" onClick={addItem}>+ Legg til ny post</button>
          </div>
        </div>
      )}

      {tab==='preview' && (
        <div>
          <div className="preview-actions">
            <button className={'btn '+(copied?'btn-success':'btn-ghost')} onClick={handleCopy}>
              {copied ? '&#10003; Kopiert!' : 'Kopier tekst'}
            </button>
            <button className="btn btn-primary" onClick={handleDownloadDocx}>Last ned .docx</button>
          </div>
          {docxStatus && (
            <div className={'status-box '+(docxStatus.startsWith('Feil')?'status-error':'status-info')} style={{marginBottom:12}}>
              {docxStatus}
            </div>
          )}
          <pre>{genText()}</pre>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
